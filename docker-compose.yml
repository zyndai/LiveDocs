services:

  # ── Qdrant (vector DB) ────────────────────────────────────────────────────
  # Bound to localhost only — not exposed to the public internet.
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"   # REST + dashboard (local only)
      - "127.0.0.1:6334:6334"   # gRPC (local only)
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Build (one-shot: walk code + docs → embed → Qdrant) ──────────────────
  # Run once: docker compose --profile build run --rm build
  # Re-run whenever code/ or docs/ change.
  # build:
