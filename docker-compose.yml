  #     - path: .env
  #       required: false
  #   environment:
  #     - QDRANT_URL=http://qdrant:6333   # internal service name, not localhost
  #     - QDRANT_API_KEY=${QDRANT_API_KEY:-}
  #   volumes:
  #     - ./code:/app/code:ro
  #     - ./docs:/app/docs:ro
  #     - ./tmp:/app/tmp
  #   depends_on:
  #     qdrant:
  #       condition: service_healthy
  #   profiles:
  #     - build

