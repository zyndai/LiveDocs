<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Codebase RAG</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7c6bff;
    --accent2: #a78bfa;
    --text: #e2e2e8;
    --muted: #6b6b80;
    --code-bg: #12121a;
    --user-bg: #1a1a2e;
    --ai-bg: #0f1520;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  header h1 { font-size: 15px; font-weight: 600; }
  header .sub { font-size: 12px; color: var(--muted); margin-left: auto; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }
  .status-dot.loading { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    gap: 12px;
  }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 8px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 600;
  }
  .msg.user .avatar { background: linear-gradient(135deg, #1e40af, #3b82f6); }
  .msg.ai .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.7;
    flex: 1;
    min-width: 0;
    overflow-wrap: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border-color: #1e3a5f;
    text-align: right;
  }
  .msg.ai .bubble { background: var(--ai-bg); border-color: #1a1f35; }

  /* Inline code */
  code {
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--accent2);
  }

  /* Streaming cursor */
  .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink .7s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Sources */
  .sources {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .sources-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .source-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .source-chip {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    font-family: monospace;
    color: var(--accent2);
    cursor: default;
    transition: border-color .15s;
  }
  .source-chip:hover { border-color: var(--accent); }
  .source-chip .score {
    color: var(--muted);
    font-size: 10px;
  }
  .source-chip .type-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  .type-badge.code { background: #1a2a1a; color: var(--green); }
  .type-badge.docs { background: #1a1a2a; color: var(--accent2); }

  /* Sub-queries */
  .subqueries {
    margin-top: 8px;
    display: flex; flex-wrap: wrap; gap: 5px;
  }
  .sq-tag {
    font-size: 11px;
    background: #1a1520;
    border: 1px solid #2a1a3a;
    color: var(--accent2);
    border-radius: 20px;
    padding: 2px 10px;
  }

  /* Input */
  #input-area {
    padding: 16px 20px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-wrapper {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    min-height: 44px;
    max-height: 140px;
    outline: none;
    transition: border-color .2s;
    font-family: inherit;
    line-height: 1.5;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  button#send {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .1s;
    flex-shrink: 0;
    color: white;
  }
  button#send:hover { background: var(--accent2); }
  button#send:active { transform: scale(.95); }
  button#send:disabled { background: var(--border); cursor: not-allowed; }

  /* Empty state */
  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    text-align: center;
  }
  #empty .big-logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  #empty h2 { font-size: 20px; color: var(--text); }
  #empty p { font-size: 13px; max-width: 340px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
  .suggestion {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    color: var(--text);
  }
  .suggestion:hover { border-color: var(--accent); background: var(--surface); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <h1>Codebase RAG</h1>
  <span class="sub">Code + Docs · Gemini · Qdrant</span>
  <div class="status-dot" id="status"></div>
</header>

<div id="messages">
  <div id="empty">
    <div class="big-logo">⚡</div>
    <h2>Ask anything about your codebase</h2>
    <p>Searches code + docs with hybrid retrieval and graph expansion.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="ask(this.textContent)">How does the code walker work?</div>
      <div class="suggestion" onclick="ask(this.textContent)">What is the main entry point?</div>
      <div class="suggestion" onclick="ask(this.textContent)">How are embeddings generated?</div>
      <div class="suggestion" onclick="ask(this.textContent)">Explain the graph expansion logic</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea id="q" placeholder="Ask about your code or docs…" rows="1"></textarea>
    <button id="send" onclick="sendQuestion()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
const API = 'https://docs-rag.zynd.ai';
const history = [];
let streaming = false;

const messagesEl = document.getElementById('messages');
const emptyEl = document.getElementById('empty');
const qEl = document.getElementById('q');
const sendBtn = document.getElementById('send');
const statusDot = document.getElementById('status');

// Auto-resize textarea
qEl.addEventListener('input', () => {
  qEl.style.height = 'auto';
  qEl.style.height = Math.min(qEl.scrollHeight, 140) + 'px';
});

qEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
});

function ask(text) { qEl.value = text; sendQuestion(); }

function setStatus(s) {
  statusDot.className = 'status-dot' + (s ? ' ' + s : '');
}

function addMsg(role, html, id) {
  if (emptyEl) emptyEl.remove();
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;
  msg.innerHTML = `
    <div class="avatar">${role === 'user' ? 'U' : '⚡'}</div>
    <div class="bubble" ${id ? `id="${id}"` : ''}>${html}</div>`;
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return msg;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatAnswer(text) {
  // inline code
  return escapeHtml(text).replace(/`([^`]+)`/g, '<code>$1</code>');
}

function renderSources(sources, subQueries) {
  let html = '';
  if (subQueries && subQueries.length > 1) {
    html += `<div class="subqueries">`;
    subQueries.forEach(sq => { html += `<span class="sq-tag">🔍 ${escapeHtml(sq)}</span>`; });
    html += '</div>';
  }
  if (sources && sources.length) {
    html += `<div class="sources"><div class="sources-label">Sources</div><div class="source-list">`;
    sources.forEach(s => {
      const isCode = s.type === 'code';
      const label = isCode
        ? `${s.file}:${s.start_line}`
        : `${s.source || ''}`;
      const score = s.score != null ? `<span class="score">${(s.score * 100).toFixed(0)}%</span>` : '';
      html += `<div class="source-chip">
        <span class="type-badge ${isCode ? 'code' : 'docs'}">${isCode ? 'code' : 'doc'}</span>
        ${escapeHtml(label)} ${score}
      </div>`;
    });
    html += '</div></div>';
  }
  return html;
}

async function sendQuestion() {
  const q = qEl.value.trim();
  if (!q || streaming) return;

  qEl.value = '';
  qEl.style.height = 'auto';
  streaming = true;
  sendBtn.disabled = true;
  setStatus('loading');

  addMsg('user', escapeHtml(q));

  const bubbleId = 'ai-' + Date.now();
  addMsg('ai', '<span class="cursor"></span>', bubbleId);
  const bubble = document.getElementById(bubbleId);

  let fullText = '';

  try {
    const resp = await fetch(`${API}/ask/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, history }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop();

      let event = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) { event = line.slice(7).trim(); }
        else if (line.startsWith('data: ')) {
          const raw = line.slice(6);
          if (event === 'token') {
            fullText += JSON.parse(raw);
            bubble.innerHTML = formatAnswer(fullText) + '<span class="cursor"></span>';
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } else if (event === 'meta') {
            const meta = JSON.parse(raw);
            bubble.innerHTML = formatAnswer(fullText) + renderSources(meta.sources, meta.sub_queries);
            history.push({ role: 'user', content: q });
            history.push({ role: 'assistant', content: fullText });
          } else if (event === 'error') {
            const err = JSON.parse(raw);
            bubble.innerHTML = `<span style="color:var(--red)">Error: ${escapeHtml(err.detail || raw)}</span>`;
          }
          event = null;
        }
      }
    }
  } catch (e) {
    bubble.innerHTML = `<span style="color:var(--red)">Connection error: ${escapeHtml(e.message)}</span>`;
    setStatus('error');
  } finally {
    streaming = false;
    sendBtn.disabled = false;
    setStatus('');
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}
</script>
</body>
</html>
